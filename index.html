<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: linear-gradient(135deg, #71b7e6, #9b59b6); }
        .card { border-top: 5px solid #007bff; animation: fadeIn 1s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .logo-area { font-size: 50px; margin-bottom: 10px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; margin-bottom: 5px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-area">🎓</div>
        <h2 style="margin: 0; color: #333;">SAS LOGIN</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 25px;">Smart Assignment Submission</p>
        
        <div class="input-group">
            <label>Registration Number (Reg No):</label>
            <input type="text" id="loginReg" placeholder="Example: T/MUST/2026/0001">
        </div>

        <div class="input-group">
            <label>Password:</label>
            <input type="password" id="loginPass" placeholder="••••••••">
        </div>

        <button id="loginBtn" onclick="handleLogin()">LOGIN TO SYSTEM</button>

        <div style="margin-top: 25px; font-size: 14px; border-top: 1px solid #eee; padding-top: 15px;">
            <p>New user? <br>
                <a href="register.html" style="color: #9b59b6; text-decoration: none; font-weight: bold;">Create Account Here</a>
            </p>
        </div>
    </div>

    <script>
        // 1. FEATURE: AUTO-LOGIN (Ili mtumiaji asitolewe)
        window.onload = function() {
            if (localStorage.getItem("user_session")) {
                // Kama session ipo, mpeleke dashboard moja kwa moja
                window.location.href = "dashboard.html"; 
            }
        };

        async function handleLogin() {
            const regNo = document.getElementById('loginReg').value;
            const password = document.getElementById('loginPass').value;
            const btn = document.getElementById('loginBtn');

            if (regNo === "" || password === "") {
                alert("Please fill in all fields!");
                return;
            }

            btn.innerText = "Authenticating...";
            btn.disabled = true;

            try {
                // 2. KUUNGANISHA NA BACKEND (MongoDB)
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ regNo: regNo, password: password })
                });

                const result = await response.json();

                if (response.ok) {
                    // Login Imefanikiwa: Tunahifadhi session kwenye kompyuta ya mtumiaji
                    localStorage.setItem("user_session", regNo); // Session id
                    localStorage.setItem("user_name", result.fullName);
                    localStorage.setItem("user_reg", result.regNo);

                    alert("Login Successful! Welcome " + result.fullName);
                    window.location.href = "dashboard.html";
                } else {
                    // Error kutoka kwenye Database (Password mbaya au User hayupo)
                    alert("Error: " + (result.error || "Invalid Credentials"));
                    btn.innerText = "LOGIN TO SYSTEM";
                    btn.disabled = false;
                }
            } catch (error) {
                console.error("Login Error:", error);
                alert("Backend Server Error! Ensure Node.js server is running.");
                btn.innerText = "LOGIN TO SYSTEM";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
