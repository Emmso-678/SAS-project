<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAS - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060818;
            --card: #0d1225;
            --accent: #4f6ef7;
            --accent2: #7c3aed;
            --glow: rgba(79,110,247,0.35);
            --text: #e8eaf6;
            --muted: #6b7280;
            --border: rgba(255,255,255,0.07);
            --input-bg: rgba(255,255,255,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            animation: drift 12s ease-in-out infinite alternate;
            pointer-events: none;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: var(--accent);
            top: -100px; left: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 300px; height: 300px;
            background: var(--accent2);
            bottom: -80px; right: -80px;
            animation-delay: -6s;
        }
        .orb-3 {
            width: 200px; height: 200px;
            background: #06b6d4;
            top: 50%; left: 60%;
            animation-delay: -3s;
        }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.1); }
        }

        /* Grid overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(79,110,247,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79,110,247,0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        /* Card */
        .card {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 400px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 0 60px rgba(79,110,247,0.12), 0 30px 60px rgba(0,0,0,0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Top accent line */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 32px; right: 32px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
            border-radius: 0 0 2px 2px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
            animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
            opacity: 0;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(79,110,247,0.1);
            border: 1px solid rgba(79,110,247,0.25);
            border-radius: 100px;
            padding: 5px 14px;
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .badge::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        .header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .header h1 span {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--muted);
            font-size: 0.85rem;
            margin-top: 6px;
        }

        /* Form */
        .form-group {
            margin-bottom: 18px;
            animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
            opacity: 0;
        }
        .form-group:nth-child(1) { animation-delay: 0.2s; }
        .form-group:nth-child(2) { animation-delay: 0.3s; }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.5;
        }

        .form-group input {
            width: 100%;
            padding: 14px 14px 14px 42px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder { color: rgba(255,255,255,0.2); }

        .form-group input:focus {
            border-color: var(--accent);
            background: rgba(79,110,247,0.06);
            box-shadow: 0 0 0 3px rgba(79,110,247,0.1);
        }

        /* Button */
        .btn-wrap {
            animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
            opacity: 0;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:active { transform: scale(0.98); }
        .btn:hover::after { opacity: 1; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Message */
        .message {
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }
        .message.error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25);
            color: #f87171;
            display: block;
        }
        .message.success {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.25);
            color: #4ade80;
            display: block;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--muted);
            animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
            opacity: 0;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .footer a:hover { color: #7c3aed; }

        /* Status indicator */
        .server-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(13,18,37,0.9);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 6px 12px;
            font-size: 11px;
            color: var(--muted);
            backdrop-filter: blur(10px);
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #6b7280;
        }
        .status-dot.online { background: #4ade80; animation: pulse 2s ease infinite; }
        .status-dot.offline { background: #f87171; }
    </style>
</head>
<body>

    <!-- Background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Login Card -->
    <div class="card">
        <div class="header">
            <div class="badge">System</div>
            <h1>Welcome to <span>SAS</span></h1>
            <p>Smart Assignment Submission System</p>
        </div>

        <div class="form-group">
            <label>Registration Number</label>
            <div class="input-wrap">
                <span class="icon">🎓</span>
                <input type="text" id="loginReg" placeholder="e.g. T/MUST/2026/0001">
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
                <span class="icon">🔒</span>
                <input type="password" id="loginPass" placeholder="Enter your password">
            </div>
        </div>

        <div class="btn-wrap">
            <button class="btn" id="loginBtn" onclick="handleLogin()">
                LOGIN TO SYSTEM
            </button>
            <div class="message" id="loginMsg"></div>
        </div>

        <div class="footer">
            New student? &nbsp;
            <a href="register.html">Create Account →</a>
        </div>
    </div>

    <!-- Server status indicator -->
    <div class="server-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Checking server...</span>
    </div>

    <script>
        const API_URL = 'http://192.168.100.201:3000';

        // Check server status on load
        async function checkServer() {
            try {
                await fetch(API_URL, { mode: 'cors', signal: AbortSignal.timeout(3000) });
                document.getElementById('statusDot').className = 'status-dot online';
                document.getElementById('statusText').textContent = 'Server Online';
            } catch {
                document.getElementById('statusDot').className = 'status-dot offline';
                document.getElementById('statusText').textContent = 'Server Offline';
            }
        }

        checkServer();

        function showMsg(text, type) {
            const el = document.getElementById('loginMsg');
            el.textContent = text;
            el.className = 'message ' + type;
        }

        async function handleLogin() {
            const regNo    = document.getElementById('loginReg').value.trim();
            const password = document.getElementById('loginPass').value.trim();
            const btn      = document.getElementById('loginBtn');

            if (!regNo || !password) {
                showMsg('⚠️ Please fill in all fields!', 'error');
                return;
            }

            btn.innerHTML = '<span class="spinner"></span>Authenticating...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ regNo, password })
                });

                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem('user_session', regNo);
                    localStorage.setItem('user_name', result.fullName);
                    localStorage.setItem('user_reg', regNo);
                    showMsg('✅ Welcome, ' + result.fullName + '!', 'success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else {
                    showMsg('❌ ' + (result.error || 'Invalid Credentials'), 'error');
                    btn.innerHTML = 'LOGIN TO SYSTEM';
                    btn.disabled = false;
                }
            } catch (error) {
                showMsg('❌ Cannot reach server. Check WiFi connection.', 'error');
                btn.innerHTML = 'LOGIN TO SYSTEM';
                btn.disabled = false;
            }
        }

        // Enter key support
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') handleLogin();
        });

        // Auto-redirect if already logged in
        if (localStorage.getItem('user_session')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
