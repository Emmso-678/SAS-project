<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAS - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060818;
            --card: #0d1225;
            --accent: #4f6ef7;
            --accent2: #7c3aed;
            --success: #10b981;
            --glow: rgba(79,110,247,0.35);
            --text: #e8eaf6;
            --muted: #6b7280;
            --border: rgba(255,255,255,0.07);
            --input-bg: rgba(255,255,255,0.04);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: drift 12s ease-in-out infinite alternate; pointer-events: none; }
        .orb-1 { width: 400px; height: 400px; background: var(--success); top: -100px; right: -100px; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; left: -80px; animation-delay: -6s; }
        .orb-3 { width: 200px; height: 200px; background: var(--accent); top: 60%; left: 20%; animation-delay: -3s; }
        @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.1); } }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(79,110,247,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(79,110,247,0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }
        .card {
            position: relative; z-index: 10;
            width: 92%; max-width: 420px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 36px 32px;
            box-shadow: 0 0 60px rgba(16,185,129,0.1), 0 30px 60px rgba(0,0,0,0.5);
            animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
            opacity: 0;
        }
        .card::before {
            content: '';
            position: absolute; top: 0; left: 32px; right: 32px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--success), var(--accent), transparent);
            border-radius: 0 0 2px 2px;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .header { text-align: center; margin-bottom: 28px; animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.1s forwards; opacity: 0; }
        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25);
            border-radius: 100px; padding: 5px 14px;
            font-size: 11px; font-weight: 600; color: var(--success);
            letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 14px;
        }
        .badge::before { content: ''; width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 2s ease infinite; }
        @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.8); } }
        .header h1 { font-family: 'Syne', sans-serif; font-size: 1.9rem; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
        .header h1 span { background: linear-gradient(135deg, var(--success), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .header p { color: var(--muted); font-size: 0.85rem; margin-top: 6px; }
        .form-group { margin-bottom: 16px; animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; }
        .form-group:nth-child(1) { animation-delay: 0.15s; }
        .form-group:nth-child(2) { animation-delay: 0.22s; }
        .form-group:nth-child(3) { animation-delay: 0.29s; }
        .form-group:nth-child(4) { animation-delay: 0.36s; }
        .form-group label { display: block; font-size: 11px; font-weight: 500; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.8px; }
        .input-wrap { position: relative; }
        .input-wrap .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; opacity: 0.5; }
        .form-group input {
            width: 100%; padding: 13px 14px 13px 42px;
            background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 12px; color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
            outline: none; transition: all 0.3s ease;
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.2); }
        .form-group input:focus { border-color: var(--success); background: rgba(16,185,129,0.05); box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
        .form-group input.error-field { border-color: #ef4444; }
        .btn-wrap { animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.43s forwards; opacity: 0; }
        .btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--success), #059669);
            border: none; border-radius: 12px; color: white;
            font-family: 'Syne', sans-serif; font-size: 0.95rem;
            font-weight: 700; letter-spacing: 1px; cursor: pointer;
            position: relative; overflow: hidden; transition: all 0.3s ease;
        }
        .btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent); opacity: 0; transition: opacity 0.3s; }
        .btn:active { transform: scale(0.98); }
        .btn:hover::after { opacity: 1; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .message { margin-top: 12px; padding: 12px 16px; border-radius: 10px; font-size: 0.85rem; text-align: center; display: none; }
        .message.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #f87171; display: block; }
        .message.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: #4ade80; display: block; }
        .footer { text-align: center; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--muted); animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.5s forwards; opacity: 0; }
        .footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
        /* Password strength */
        .strength-bar { height: 3px; border-radius: 2px; background: var(--border); margin-top: 8px; overflow: hidden; }
        .strength-fill { height: 100%; border-radius: 2px; width: 0%; transition: all 0.4s ease; }
        .strength-label { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: right; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="card">
        <div class="header">
            <div class="badge">New Account</div>
            <h1>Join <span>SAS</span></h1>
            <p>Create your student account</p>
        </div>

        <div class="form-group">
            <label>Full Names</label>
            <div class="input-wrap">
                <span class="icon">👤</span>
                <input type="text" id="regName" placeholder="e.g. John Joseph Doe">
            </div>
        </div>

        <div class="form-group">
            <label>Registration Number</label>
            <div class="input-wrap">
                <span class="icon">🎓</span>
                <input type="text" id="regNo" placeholder="e.g. T/MUST/2026/0001">
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
                <span class="icon">🔒</span>
                <input type="password" id="regPass1" placeholder="Create a strong password" oninput="checkStrength(this.value)">
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-label" id="strengthLabel"></div>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-wrap">
                <span class="icon">✅</span>
                <input type="password" id="regPass2" placeholder="Repeat your password">
            </div>
        </div>

        <div class="btn-wrap">
            <button class="btn" id="regBtn" onclick="saveRegistration()">CREATE ACCOUNT</button>
            <div class="message" id="regMsg"></div>
        </div>

        <div class="footer">
            Already have an account? &nbsp;
            <a href="index.html">← Back to Login</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://192.168.100.201:3000';

        function showMsg(text, type) {
            const el = document.getElementById('regMsg');
            el.textContent = text;
            el.className = 'message ' + type;
        }

        function checkStrength(val) {
            const fill = document.getElementById('strengthFill');
            const label = document.getElementById('strengthLabel');
            let strength = 0;
            if (val.length >= 6) strength++;
            if (val.length >= 10) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            const levels = [
                { w: '0%', c: 'transparent', t: '' },
                { w: '25%', c: '#ef4444', t: 'Weak' },
                { w: '50%', c: '#f97316', t: 'Fair' },
                { w: '75%', c: '#eab308', t: 'Good' },
                { w: '100%', c: '#10b981', t: 'Strong' },
            ];
            const l = levels[Math.min(strength, 4)];
            fill.style.width = l.w;
            fill.style.background = l.c;
            label.textContent = l.t;
            label.style.color = l.c;
        }

        async function saveRegistration() {
            const fullName    = document.getElementById('regName').value.trim();
            const regNo       = document.getElementById('regNo').value.trim();
            const password    = document.getElementById('regPass1').value.trim();
            const confirmPass = document.getElementById('regPass2').value.trim();
            const btn         = document.getElementById('regBtn');

            if (!fullName || !regNo || !password || !confirmPass) {
                showMsg('⚠️ Please fill in all fields!', 'error'); return;
            }
            if (password.length < 6) {
                showMsg('⚠️ Password must be at least 6 characters!', 'error'); return;
            }
            if (password !== confirmPass) {
                showMsg('❌ Passwords do not match!', 'error'); return;
            }

            btn.innerHTML = '<span class="spinner"></span>Creating Account...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, regNo, password })
                });
                const result = await response.json();

                if (response.ok) {
                    showMsg('✅ Account created! Redirecting to login...', 'success');
                    setTimeout(() => { window.location.href = 'index.html'; }, 1800);
                } else {
                    showMsg('❌ ' + (result.error || 'Registration failed'), 'error');
                    btn.innerHTML = 'CREATE ACCOUNT';
                    btn.disabled = false;
                }
            } catch (error) {
                showMsg('❌ Cannot reach server. Check WiFi connection.', 'error');
                btn.innerHTML = 'CREATE ACCOUNT';
                btn.disabled = false;
            }
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') saveRegistration(); });
    </script>
</body>
</html>
