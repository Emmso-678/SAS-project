<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS - Register</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #71b7e6, #9b59b6);
        }
        .card {
            border-top: 5px solid #28a745;
            animation: fadeIn 0.8s ease-in-out;
            max-width: 450px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .input-group {
            text-align: left;
            margin-bottom: 10px;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            color: #555;
            margin-bottom: 3px;
        }
        #regBtn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="margin: 0; color: #333;">SAS REGISTER</h2>
        <p style="color: #666; font-size: 13px; margin-bottom: 20px;">Create your new account</p>
        
        <div class="input-group">
            <label>Full Names (Three Names):</label>
            <input type="text" id="regName" placeholder="Example: John Joseph Doe">
        </div>

        <div class="input-group">
            <label>Registration Number (Reg No):</label>
            <input type="text" id="regNo" placeholder="Example: T/MUST/2026/0001">
        </div>

        <div class="input-group">
            <label>Password:</label>
            <input type="password" id="regPass1" placeholder="Enter password">
        </div>

        <div class="input-group">
            <label>Verify Password:</label>
            <input type="password" id="regPass2" placeholder="Repeat password">
        </div>

        <button id="regBtn" onclick="saveRegistration()" style="background: #28a745; margin-top: 15px;">COMPLETE REGISTRATION</button>

        <div style="margin-top: 20px; font-size: 14px; border-top: 1px solid #eee; padding-top: 10px;">
            <p>Already have an account? <br>
                <a href="index.html" style="color: #007bff; text-decoration: none; font-weight: bold;">Back to Login</a>
            </p>
        </div>
    </div>

    <script>
        async function saveRegistration() {
            const name = document.getElementById('regName').value;
            const reg = document.getElementById('regNo').value;
            const p1 = document.getElementById('regPass1').value;
            const p2 = document.getElementById('regPass2').value;
            const btn = document.getElementById('regBtn');

            // 1. Validating inputs
            if (name === "" || reg === "" || p1 === "" || p2 === "") {
                alert("Please fill in all details!");
                return;
            }

            if (p1 !== p2) {
                alert("Passwords do not match!");
                return;
            }

            // Change button state to show processing
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                // 2. Sending data to Node.js Backend
                const response = await fetch('http://localhost:3000/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        fullName: name,
                        regNo: reg,
                        password: p1
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    // Success: Optional - also save locally to remember name
                    localStorage.setItem("user_name", name);
                    localStorage.setItem("user_reg", reg);

                    alert("Registration Successful! You can now login.");
                    window.location.href = "index.html";
                } else {
                    // Error from Backend (e.g., User already exists)
                    alert("Error: " + (result.error || "Failed to register account"));
                    btn.innerText = "COMPLETE REGISTRATION";
                    btn.disabled = false;
                }
            } catch (error) {
                console.error("Registration Error:", error);
                alert("Cannot connect to server! Ensure Node.js server is running on port 3000.");
                btn.innerText = "COMPLETE REGISTRATION";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
